<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#FAF5FF"/>
  <!-- Background -->
  <circle cx="350" cy="50" r="90" fill="#E9D5FF" opacity="0.5"/>
  <circle cx="50" cy="270" r="60" fill="#DDD6FE" opacity="0.4"/>
  <!-- Main card -->
  <rect x="60" y="60" width="280" height="180" rx="16" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <!-- Header -->
  <rect x="60" y="60" width="280" height="44" rx="16" fill="#7C3AED"/>
  <rect x="60" y="82" width="280" height="22" fill="#7C3AED"/>
  <!-- WC badge -->
  <rect x="276" y="67" width="52" height="30" rx="8" fill="white" opacity="0.2"/>
  <text x="302" y="87" font-family="sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">WC</text>
  <!-- Dots -->
  <circle cx="90" cy="82" r="7" fill="#C4B5FD"/>
  <circle cx="114" cy="82" r="7" fill="#FDE047"/>
  <circle cx="138" cy="82" r="7" fill="#F87171"/>
  <!-- PHP code lines -->
  <text x="82" y="128" font-family="monospace" font-size="12" fill="#7C3AED" font-weight="bold">&lt;?php</text>
  <text x="82" y="148" font-family="monospace" font-size="12" fill="#0F172A">add_filter(</text>
  <text x="82" y="165" font-family="monospace" font-size="12" fill="#DC2626">  'woocommerce_',</text>
  <text x="82" y="182" font-family="monospace" font-size="12" fill="#7C3AED">  'my_callback'</text>
  <text x="82" y="199" font-family="monospace" font-size="12" fill="#0F172A">);</text>
  <!-- Badge -->
  <rect x="105" y="218" width="190" height="28" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="237" font-family="sans-serif" font-size="12" font-weight="700" fill="#7C3AED" text-anchor="middle">35 CÓDIGOS WOOCOMMERCE</text>
</svg>
