<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#FFFBEB"/>
  <!-- Background glows -->
  <circle cx="330" cy="55" r="90" fill="#FEF3C7" opacity="0.7"/>
  <circle cx="70" cy="255" r="65" fill="#FDE68A" opacity="0.4"/>
  <!-- Main card -->
  <rect x="50" y="50" width="300" height="200" rx="20" fill="white" stroke="#FEC301" stroke-width="2"/>
  <!-- Top bar - gradient Google colors -->
  <defs>
    <linearGradient id="googleGrad" x1="50" y1="0" x2="350" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="33%" stop-color="#EA4335"/>
      <stop offset="66%" stop-color="#FBBC04"/>
      <stop offset="100%" stop-color="#34A853"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="300" height="6" rx="3" fill="url(#googleGrad)"/>
  <rect x="50" y="50" width="300" height="52" rx="20" fill="#1A1A2E" opacity="0.92"/>
  <rect x="50" y="80" width="300" height="22" fill="#1A1A2E" opacity="0.92"/>
  <!-- Google G colored circles -->
  <circle cx="78" cy="76" r="12" fill="#4285F4" opacity="0.9"/>
  <circle cx="78" cy="76" r="7" fill="#EA4335"/>
  <circle cx="78" cy="76" r="3" fill="white"/>
  <!-- Title -->
  <text x="200" y="82" font-family="sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">AGENTE IA GOOGLE ADS</text>
  <!-- Chart / performance bars -->
  <rect x="90" y="170" width="20" height="50" rx="4" fill="#4285F4" opacity="0.7"/>
  <rect x="120" y="145" width="20" height="75" rx="4" fill="#34A853" opacity="0.7"/>
  <rect x="150" y="130" width="20" height="90" rx="4" fill="#FBBC04"/>
  <rect x="180" y="115" width="20" height="105" rx="4" fill="#EA4335" opacity="0.7"/>
  <rect x="210" y="100" width="20" height="120" rx="4" fill="#4285F4"/>
  <rect x="240" y="118" width="20" height="102" rx="4" fill="#34A853"/>
  <rect x="270" y="105" width="20" height="115" rx="4" fill="#FEC301"/>
  <!-- Baseline -->
  <line x1="80" y1="220" x2="310" y2="220" stroke="#E5E7EB" stroke-width="2"/>
  <!-- AI spark -->
  <circle cx="310" cy="100" r="18" fill="#FEC301" opacity="0.15"/>
  <text x="310" y="106" font-family="sans-serif" font-size="18" text-anchor="middle">⚡</text>
  <!-- Price badge -->
  <rect x="118" y="232" width="164" height="0" rx="14" fill="#FEC301"/>
</svg>
