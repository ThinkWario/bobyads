<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F0FDF4"/>
  <!-- Background circles -->
  <circle cx="340" cy="40" r="80" fill="#BBF7D0" opacity="0.5"/>
  <circle cx="60" cy="260" r="60" fill="#86EFAC" opacity="0.3"/>
  <!-- Code card -->
  <rect x="60" y="60" width="280" height="180" rx="16" fill="white" stroke="#16A34A" stroke-width="2"/>
  <!-- Top bar -->
  <rect x="60" y="60" width="280" height="44" rx="16" fill="#16A34A"/>
  <rect x="60" y="82" width="280" height="22" fill="#16A34A"/>
  <!-- Dots -->
  <circle cx="90" cy="82" r="7" fill="#4ADE80"/>
  <circle cx="114" cy="82" r="7" fill="#FDE047"/>
  <circle cx="138" cy="82" r="7" fill="#F87171"/>
  <!-- Shopify S logo simplified -->
  <text x="310" y="90" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <!-- Code lines -->
  <text x="82" y="130" font-family="monospace" font-size="13" fill="#16A34A" font-weight="bold">&#123;%</text>
  <text x="108" y="130" font-family="monospace" font-size="13" fill="#0F172A"> assign cart = </text>
  <text x="82" y="152" font-family="monospace" font-size="13" fill="#DC2626">  cart.items</text>
  <text x="160" y="152" font-family="monospace" font-size="13" fill="#0F172A"> %&#125;</text>
  <text x="82" y="174" font-family="monospace" font-size="13" fill="#16A34A" font-weight="bold">&#123;&#123;</text>
  <text x="102" y="174" font-family="monospace" font-size="13" fill="#7C3AED"> product.title </text>
  <text x="236" y="174" font-family="monospace" font-size="13" fill="#16A34A" font-weight="bold">&#125;&#125;</text>
  <text x="82" y="196" font-family="monospace" font-size="13" fill="#6B7280">&#123;%- endif -%&#125;</text>
  <!-- Badge -->
  <rect x="110" y="218" width="180" height="28" rx="14" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="200" y="237" font-family="sans-serif" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">100 SNIPPETS LIQUID</text>
</svg>
